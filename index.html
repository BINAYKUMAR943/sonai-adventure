<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1b2559" />
  <title>Sonai Star Quest</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell">
    <section class="game-card">
      <canvas id="game" width="960" height="540" aria-label="Sonai Star Quest game canvas"></canvas>
      <div class="touch-controls" aria-hidden="true">
        <div class="touch-left">
          <button class="touch-btn" data-key="ArrowLeft">◀</button>
          <button class="touch-btn" data-key="ArrowRight">▶</button>
        </div>
        <div class="touch-right">
          <button class="touch-btn small" data-key="ShiftLeft">RUN</button>
          <button class="touch-btn jump" data-key="Space">JUMP</button>
        </div>
      </div>
    </section>
    <section class="help">
      <strong>Controls:</strong> ← → or A/D move · Space/W/↑ jump · Shift/X run · P pause · R restart · M mute
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
